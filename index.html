<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>manguns's mango shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header role="banner">mango</header>
  <main>
    <div class="mango-container">
      <button class="mango-button" aria-label="mango button">mango</button>
      <button class="guns-button" aria-label="guns button">guns</button>
      <ul class="mango-list" role="list">
        <li>tutorial: pick up mangos</li>
        <li>use the totally not real right front of you mango button</li>
        <li>and go crazy over 67 mangos. bai</li>
      </ul>
    </div>
    <div class="leaderboard">
      <h2>leaderboard</h2>
      <ul class="leaderboard-list" role="list">
        <li>manguns - produced 69 mangos</li>
        <li>chrxmee - produced 67 mangos</li>
      </ul>
    </div>
    <div class="library">
      <h2>library</h2>
      <ul class="library-list" role="list">
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
      </ul>
    </div>
    <div class="producer">
      <h2>producer</h2>
      <button class="music-button" aria-label="music button">music</button>
    </div>
    <div class="mango-fall"></div>
    <div class="pistol-container" aria-hidden="true">
      <img src="pistol.jpeg" alt="pistol image" class="pistol-image" />
      <audio src="pistol.mp3" class="pistol-audio"></audio>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
